# ============================================================================
#  Despliegue automático a Hostinger por FTP
#
#  Qué hace: cada vez que subís cambios a la rama "main", GitHub sube los
#  archivos web (index.html, api.js, install.php y la carpeta api/) a tu
#  Hostinger, directo dentro de public_html.
#
#  Necesita 3 "secrets" en GitHub:
#    FTP_SERVER (212.85.6.157)  ·  FTP_USERNAME (u434165369)  ·  FTP_PASSWORD
#
#  No toca tu config.php del servidor (está excluido) y no sube las carpetas
#  database/ ni docs/ (son solo para vos, no van a la web).
# ============================================================================
name: Desplegar a Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Traer los archivos del repo
        uses: actions/checkout@v4

      - name: Subir por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp            # FTP simple: el host de Hostinger es una IP
          port: 21
          local-dir: ./           # se sube desde la raíz del repo...
          server-dir: ./public_html/   # ...directo a public_html
          # Lo que NO se sube (cosas internas, secretos y carpetas no-web):
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            database/**
            docs/**
            README.md
            .gitignore
            **/config.php
