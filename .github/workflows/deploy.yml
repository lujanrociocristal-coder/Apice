# ============================================================================
#  Despliegue automatico a Hostinger por FTP
#  Sube los archivos web (index.html, api.js, install.php, api/) directo a
#  public_html cada vez que se actualiza la rama main.
#  Secrets: FTP_SERVER (212.85.6.157) / FTP_USERNAME (u434165369) / FTP_PASSWORD
#  No toca config.php ni sube database/ ni docs/.
# ============================================================================
name: Desplegar a Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Traer los archivos del repo
        uses: actions/checkout@v4

      - name: Subir por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ./public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            database/**
            docs/**
            README.md
            .gitignore
            **/config.php
